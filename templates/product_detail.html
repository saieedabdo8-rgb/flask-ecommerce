{% extends 'base.html' %}
{% block title %}{{ product.title }} - 2A and o{% endblock %}
{% block content %}

<div class="max-w-7xl mx-auto px-4 py-8">
  <nav class="text-sm text-gray-500 mb-6">
    <a href="/" class="hover:text-primary-600">الرئيسية</a>
    <span class="mx-2">/</span>
    <span class="text-gray-800 font-medium">{{ product.title }}</span>
  </nav>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
    <div class="aspect-square rounded-2xl overflow-hidden bg-gray-100 shadow-md">
      <img src="{{ product.image_url or 'https://placehold.co/600x600/e2e8f0/64748b?text=No+Image' }}"
           alt="{{ product.title }}"
           class="w-full h-full object-cover">
    </div>

    <div class="flex flex-col justify-center">
      <h1 class="text-3xl font-bold text-gray-900 mb-4">{{ product.title }}</h1>
      <p class="text-4xl font-bold text-primary-600 mb-4">{{ product.price }} ج.م</p>
      {% if product.description %}
        <p class="text-gray-600 leading-relaxed mb-6">{{ product.description }}</p>
      {% endif %}

      <hr class="my-6 border-gray-200">

      <h3 class="text-lg font-bold mb-4">تقديم طلب</h3>
      <form action="{{ url_for('place_order', product_id=product.id) }}" method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">الاسم الكامل *</label>
          <input type="text" name="name" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                 placeholder="أدخل اسمك">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">رقم الهاتف *</label>
          <input type="tel" name="phone" required dir="ltr"
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                 placeholder="01xxxxxxxxx">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">العنوان بالكامل *</label>
          <textarea name="address" required rows="3"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition resize-none"
                    placeholder="المدينة، الشارع، رقم المنزل..."></textarea>
        </div>
        <button type="submit"
                class="w-full bg-primary-600 text-white py-3 rounded-lg font-bold text-lg hover:bg-primary-700 transition active:scale-95">
          إرسال الطلب
        </button>
      </form>
    </div>
  </div>

  <div class="text-center">
    <a href="/" class="text-primary-600 hover:text-primary-700 font-medium transition">&larr; العودة للمنتجات</a>
  </div>
</div>

{% endblock %}
